<!-- ═══════════════════════════════════════════════════
     VIEW: PRIVATE KEY BACKUP
     Shown once after registration.
     Loaded by: js/loader.js → #viewKeyBackup
════════════════════════════════════════════════════ -->
<div id="viewKeyBackup" class="auth-layout hidden">
  <div class="auth-card" style="max-width:520px">

    <div style="text-align:center; margin-bottom:1.5rem">
      <div style="font-size:2.5rem; margin-bottom:0.75rem">🔑</div>
      <h2 style="font-size:1.3rem; margin-bottom:0.375rem">
        Save Your Private Key
      </h2>
      <p class="text-sm text-muted">
        This is your only chance to save it.
        Without it, you cannot decrypt your files.
      </p>
    </div>

    <div class="alert alert-warning" style="margin-bottom:1rem">
      <span class="alert-icon">⚠</span>
      <div class="alert-content">
        <div class="alert-title">Critical Security Notice</div>
        <div>Store this key securely. It will not be shown again.</div>
      </div>
    </div>

    <!-- Key display + copy/download actions -->
    <div class="key-backup">
      <div class="key-backup-warning">⚠ Your RSA Private Key</div>
      <div class="key-display" id="privateKeyDisplay"></div>
      <div class="flex gap-2 mt-3">
        <button class="btn btn-secondary btn-sm"
          onclick="copyPrivateKey()">
          📋 Copy
        </button>
        <button class="btn btn-secondary btn-sm"
          onclick="downloadPrivateKey()">
          ⬇ Download .pem
        </button>
      </div>
    </div>

    <!-- Confirmation checkbox — must be checked before continuing -->
    <div class="form-group mt-4">
      <label class="flex gap-2 items-center"
        style="cursor:pointer; font-size:0.875rem; color:var(--text-secondary)">
        <input type="checkbox" id="keyConfirm"
          style="accent-color:var(--navy-400)">
        I have securely saved my private key and understand it cannot be recovered
      </label>
    </div>

    <button class="btn btn-primary btn-full mt-3"
      id="keyConfirmBtn" onclick="proceedAfterKeyBackup()" disabled>
      Continue to Dashboard →
    </button>

  </div>
</div>
